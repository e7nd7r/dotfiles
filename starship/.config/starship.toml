format = """
[╭─](bold cyan)$all
[╰─](bold cyan)$character"""

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'

[directory]
format = '[ $path]($style)[$read_only]($read_only_style) '
style = 'bold blue'
read_only = ' '

[aws]
disabled = true

[gcloud]
disabled = true

[line_break]
disabled = true

[rust]
format = 'via [ $version](red bold)'
